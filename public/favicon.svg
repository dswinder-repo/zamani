<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0a0a0a" rx="6"/>
  <!-- Ndebele diamond in gold -->
  <polygon points="16,4 28,16 16,28 4,16" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <polygon points="16,10 22,16 16,22 10,16" fill="#c9a84c"/>
  <!-- "Z" letterform in gold (simplified geometric) -->
  <!-- top bar -->
  <line x1="11" y1="13" x2="21" y2="13" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  <!-- diagonal -->
  <line x1="21" y1="13" x2="11" y2="19" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  <!-- bottom bar -->
  <line x1="11" y1="19" x2="21" y2="19" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
</svg>
